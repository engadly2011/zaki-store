<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أقراص تنظيف الغسالة الأصلية</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #04091a; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; background: #0a1628; padding: 20px; border-radius: 20px; border: 1px solid #1e293b; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-family: 'Cairo'; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; }
        .price { font-size: 24px; color: #FFD700; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2>أقراص تنظيف الغسالة السحرية</h2>
        <p>نظفي غسالتك من الداخل واقضي على الروائح الكريهة</p>
        <div class="price">السعر: 199 جنيه + شحن مجاني</div>
        
        <div id="orderForm">
            <input type="text" id="name" placeholder="الاسم بالكامل" required>
            <input type="tel" id="phone" placeholder="رقم الهاتف" required>
            <select id="city">
                <option value="">اختر المحافظة</option>
                <option value="القاهرة">القاهرة</option>
                <option value="الجيزة">الجيزة</option>
                <option value="الإسكندرية">الإسكندرية</option>
            </select>
            <button class="btn" onclick="submitOrder()">اطلب الآن - الدفع عند الاستلام</button>
        </div>
    </div>

    <script>
        function submitOrder() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            if(!name || !phone) { alert('برجاء ملء البيانات'); return; }

            const btn = document.querySelector('.btn');
            btn.textContent = 'جاري تسجيل طلبك...';
            btn.disabled = true;

            // استبدل هذا الرابط برابط السكربت الخاص بك
            fetch('https://script.google.com/macros/s/AKfycbwwvJJWm4IeULo8EZrYh5j7ByyBosl_FjgboRBKwYzgrH5H_Bs_H7tIC-yjECiyQ-zk/exec', {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    name: name,
                    phone: phone,
                    city: document.getElementById('city').value,
                    product: 'أقراص تنظيف الغسالة',
                    upsell: 'لا يوجد'
                })
            }).then(() => {
                // التوجيه لملف الأحذية
                window.location.href =
        `shoes.html?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&city=${encodeURIComponent(document.getElementById('city').value)}`;
            }).catch(() => {
                window.location.href =
        `shoes.html?name=${encodeURIComponent(name)}&phone=${encodeURIComponent(phone)}&city=${encodeURIComponent(document.getElementById('city').value)}`;
            });
        }
    </script>
</body>
</html>
